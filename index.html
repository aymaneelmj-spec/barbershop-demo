<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon — multiple formats for all browsers -->
    <link rel="icon" type="image/png" sizes="32x32" href="/gallery/barbershoplogo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/gallery/barbershoplogo.png" />
    <link rel="shortcut icon" href="/gallery/barbershoplogo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/gallery/barbershoplogo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />

    <!-- Clean title — no emojis -->
    <title>Gentle Hands Barber | حلاق الأيدي الرقيقة</title>
    <meta name="description" content="Premium barbershop in Riyadh, Saudi Arabia. Book your appointment online." />

    <!-- Force dark BEFORE React loads — zero white flash on any device -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { 
        background-color: #09090b; 
        margin: 0; 
        padding: 0;
        overflow-x: hidden;
        max-width: 100vw;
      }
      /* Prevent layout shift while fonts load */
      body { font-display: swap; }
    </style>
    <script>document.documentElement.classList.add('dark');</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
